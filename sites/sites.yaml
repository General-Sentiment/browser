rules:
  - name: YouTube
    enabled: true
    matches:
      - '*://www.youtube.com/*'
    css:
      - sites/youtube/style.css
    js:
      - sites/youtube/script.js
  - name: Twitter
    enabled: true
    matches:
      - '*://x.com/*'
      - '*://twitter.com/*'
    css:
      - sites/twitter/style.css
  - name: Instagram
    enabled: true
    matches:
      - '*://www.instagram.com/*'
    css:
      - sites/instagram/style.css
    js:
      - sites/instagram/script.js
