<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unable to load page</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: oklch(0.99 0 0);
      --text: oklch(0.2 0 0);
      --text-dim: oklch(0.5 0 0);
      --border: oklch(0.9 0 0);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: oklch(0.15 0 0);
        --text: oklch(0.95 0 0);
        --text-dim: oklch(0.6 0 0);
        --border: oklch(0.25 0 0);
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 32rem;
      width: 100%;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }
    .reason {
      color: var(--text-dim);
      font-size: 0.875rem;
      margin: 0 0 1.5rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .url {
      color: var(--text-dim);
      font-size: 0.875rem;
      word-break: break-all;
      padding: 0.75rem 1rem;
      border: 0.0625rem solid var(--border);
      border-radius: 0.5rem;
      margin: 0 0 1.5rem;
    }
    button {
      background: none;
      border: 0.0625rem solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      cursor: pointer;
      font: inherit;
    }
    button:hover { border-color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Unable to load page</h1>
    <p class="reason" id="reason"></p>
    <div class="url" id="url"></div>
    <button onclick="location.reload()">Try again</button>
  </div>
  <script>
    const params = new URLSearchParams(location.search)
    const url = params.get('url') || ''
    const code = params.get('code') || ''
    const desc = params.get('desc') || 'The page could not be loaded.'
    document.getElementById('url').textContent = url
    document.getElementById('reason').textContent = code ? `${desc} (${code})` : desc
    document.title = 'Unable to load ' + (url ? new URL(url).hostname : 'page')
    const reloadBtn = document.querySelector('button')
    reloadBtn.addEventListener('click', () => {
      if (url) location.href = url
    })
  </script>
</body>
</html>
